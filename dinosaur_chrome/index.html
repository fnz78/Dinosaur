<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Dino UI</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="game-container">
    <div class="high-score">HI 00000</div>
    <div class="score">00000</div>
    <div class="dino">
      <div class="dino-head"></div>
      <div class="dino-eye"></div>
      <div class="dino-neck"></div>
      <div class="dino-jaw"></div>
      <div class="dino-body-1"></div>
      <div class="dino-body-2"></div>
      <div class="dino-body-3"></div>
      <div class="dino-belly"></div>
      <div class="dino-tail-1"></div>
      <div class="dino-tail-2"></div>
      <div class="dino-arm"></div>
      <div class="dino-arm-drop"></div>
      <div class="dino-leg left-leg"></div>
      <div class="dino-leg right-leg"></div>
    </div>
    <div class="ground"></div>
    <button class="restart-btn" id="restart-btn" aria-label="Restart">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 13 11" width="39" height="33" fill="currentColor">
        <circle cx="2.5" cy="2.5" r="0.5"/>
        <circle cx="2.5" cy="3.5" r="0.5"/>
        <circle cx="2.5" cy="4.5" r="0.5"/>
        <circle cx="2.5" cy="5.5" r="0.5"/>
        <circle cx="3.5" cy="6.5" r="0.5"/>
        <circle cx="4.5" cy="6.5" r="0.5"/>
        <circle cx="5.5" cy="6.5" r="0.5"/>
        <circle cx="6.5" cy="6.5" r="0.5"/>
        <circle cx="7.5" cy="6.5" r="0.5"/>
        <circle cx="8.5" cy="6.5" r="0.5"/>
        <circle cx="9.5" cy="6.5" r="0.5"/>
        <circle cx="10.5" cy="6.5" r="0.5"/>
        <circle cx="9.5" cy="5.5" r="0.5"/>
        <circle cx="8.5" cy="4.5" r="0.5"/>
        <circle cx="9.5" cy="7.5" r="0.5"/>
        <circle cx="8.5" cy="8.5" r="0.5"/>
      </svg>
    </button>
    <div class="game-over-text" id="game-over-text">GAME OVER</div>
  </div>
  <div class="controls"></div>
  <script src="/script.js"></script>
</body>
</html>
